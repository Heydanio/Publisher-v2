name: Bot TikTok 1 - Pro

on:
  schedule:
    # 🕒 Réveil automatique (Heures UTC)
    # Ex: '10 10,16,19 * * *' lancera le bot à 11h10, 17h10 et 20h10 (Heure Paris Hiver)
    - cron: '10 10,16,19 * * *' 
  workflow_dispatch:      # Permet de lancer le bot manuellement pour tester

jobs:
  publish:
    runs-on: ubuntu-latest
    
    # Sécurité pour permettre au bot d'écrire si besoin (Keep-Alive)
    permissions:
      contents: write

    steps:
      - name: 📥 Récupération du code
        uses: actions/checkout@v4

      - name: 🐍 Installation de Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Installation des dépendances Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: 🌐 Installation du moteur Playwright (Navigateur)
        run: playwright install chromium --with-deps

      - name: 🚀 Lancement du Bot TikTok
        env:
          # --- Identification du compte ---
          ACCOUNT_NAME: "tiktok_1"
          
          # --- Secrets spécifiques à TikTok 1 ---
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID_TT_1 }}
          TIKTOK_COOKIES_TIKTOK_1: ${{ secrets.TIKTOK_COOKIES_TIKTOK_1 }}
          
          # --- Secrets communs (Google Drive & Database) ---
          GDRIVE_SA_JSON_B64: ${{ secrets.GDRIVE_SA_JSON_B64 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/main.py