name: Bot TikTok 1 - Makiisthenes V2

on:
  workflow_dispatch:
    inputs:
      force_post:
        description: 'Forcer la publication'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python_version: "3.11"

      - name: 📥 Clone et Patch Moteur (Logic Upstream)
        run: |
          rm -rf upstream
          git clone https://github.com/makiisthenes/TiktokAutoUploader upstream
          
          # Installation des dépendances
          pip install --upgrade pip
          pip install "selenium>=4.20.0" undetected-chromedriver
          pip install -r upstream/requirements.txt --no-deps
          pip install requests requests-toolbelt browser-cookie3 fake-useragent google-api-python-client google-auth google-auth-oauthlib supabase moviepy==1.0.3

          # Lien symbolique pour redresser la structure d'import
          ln -s upstream/tiktok_uploader tiktok_uploader 2>/dev/null || true
          
          # Installation du signataire Node
          cd upstream/tiktok_uploader/tiktok-signature
          npm install

      - name: 🚀 Run Publisher
        env:
          PYTHONPATH: .:${{ github.workspace }}/upstream
          ACCOUNT_NAME: "tiktok_1"
          FORCE_POST: ${{ github.event.inputs.force_post == 'true' && '1' || '0' }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GDRIVE_SA_JSON_B64: ${{ secrets.GDRIVE_SA_JSON_B64 }}
          TIKTOK_COOKIES_TIKTOK_1: ${{ secrets.TIKTOK_COOKIES_TIKTOK_1 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/main.py