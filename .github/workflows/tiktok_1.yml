name: Bot TikTok 

on:
  schedule:
    # Heures UTC (8=9h, 11=12h, 14=15h, 16=17h, 19=20h en heure d'hiver FR)
    - cron: '0 8,11,14,16,19 * * *'
  workflow_dispatch:
    inputs:
      force_post:
        description: 'Forcer un post immédiat'
        required: false
        type: boolean
        default: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📥 Clone et Patch Moteur
        run: |
          rm -rf upstream
          git clone https://github.com/makiisthenes/TiktokAutoUploader upstream
          
          python -m pip install --upgrade pip
          pip install "selenium>=4.20.0" undetected-chromedriver
          pip install -r upstream/requirements.txt --no-deps
          pip install google-api-python-client google-auth google-auth-oauthlib supabase
          
          ln -s upstream/tiktok_uploader tiktok_uploader 2>/dev/null || true
          mkdir -p tiktok_uploader/tiktok-signature
          
          B64=''
          echo "$B64" | base64 -d > tiktok_uploader/tiktok-signature/browser.js
          
          cd upstream/tiktok_uploader/tiktok-signature
          npm install

      - name: ⚙️ Create config.txt
        run: |
          echo 'COOKIES_DIR=./CookiesDir' > config.txt
          echo 'VIDEOS_DIR=./VideosDirPath' >> config.txt
          echo 'POST_PROCESSING_VIDEO_PATH=./VideosDirPath' >> config.txt
          echo 'IMAGEMAGICK_FONT=Arial' >> config.txt
          echo 'IMAGEMAGICK_FONT_SIZE=80' >> config.txt
          echo 'IMAGEMAGICK_TEXT_FOREGROUND_COLOR=white' >> config.txt
          echo 'IMAGEMAGICK_TEXT_BACKGROUND_COLOR=black' >> config.txt
          echo 'TMP_YOUTUBE_VIDEO_DIR=' >> config.txt
          echo 'LANG=en' >> config.txt
          echo 'TIKTOK_BASE_URL=https://www.tiktok.com/upload?lang=' >> config.txt
          echo 'IMAGEMAGICK_BINARY=' >> config.txt
          cp config.txt upstream/config.txt

      # --- 🪄 L'ASTUCE DU DÉLAI ALÉATOIRE EST ICI ---
      - name: 🎲 Délai Aléatoire (Anti-Robot)
        # S'active UNIQUEMENT si c'est le déclencheur automatique (cron)
        if: ${{ github.event_name == 'schedule' }}
        run: |
          # Génère un nombre entre 0 et 2700 secondes (0 à 45 minutes)
          DELAY=$((RANDOM % 2700))
          MINUTES=$((DELAY / 60))
          echo "Attente de $MINUTES minutes et quelques secondes pour simuler un comportement humain..."
          sleep $DELAY

      - name: 🚀 Run Publisher
        env:
          PYTHONPATH: .:${{ github.workspace }}/upstream
          ACCOUNT_NAME: "tiktok_1"
          FORCE_POST: '1'
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GDRIVE_SA_JSON_B64: ${{ secrets.GDRIVE_SA_JSON_B64 }}
          TIKTOK_COOKIES_TIKTOK_1: ${{ secrets.TIKTOK_COOKIES_TIKTOK_1 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/main.py