name: Bot TikTok 1 - Makiisthenes V2

on:
  workflow_dispatch:
    inputs:
      force_post:
        description: 'Forcer la publication'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      - name: 📥 Installer le moteur et TOUTES les dépendances
        run: |
          git clone https://github.com/makiisthenes/TiktokAutoUploader.git engine
          # Installation des dépendances Python (Même les lourdes pour éviter les erreurs d'import)
          pip install --upgrade pip
          pip install requests requests-toolbelt browser-cookie3 fake-useragent moviepy pytube
          pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib supabase
          
          # Mock de undetected_chromedriver car on ne veut pas de Selenium/Chrome
          mkdir -p undetected_chromedriver
          touch undetected_chromedriver/__init__.py
          
          # Installation du signataire Node.js (VITAL pour X-Bogus)
          cd engine/tiktok_uploader/tiktok-signature/ && npm install
          
      - name: 🚀 Run Publisher
        env:
          # On ajoute le dossier engine au chemin de recherche Python
          PYTHONPATH: .:${{ github.workspace }}/engine
          ACCOUNT_NAME: "tiktok_1"
          FORCE_POST: ${{ github.event.inputs.force_post == 'true' && '1' || '0' }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GDRIVE_SA_JSON_B64: ${{ secrets.GDRIVE_SA_JSON_B64 }}
          TIKTOK_COOKIES_TIKTOK_1: ${{ secrets.TIKTOK_COOKIES_TIKTOK_1 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/main.py