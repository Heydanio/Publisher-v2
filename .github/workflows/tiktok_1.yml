name: Bot TikTok 1 - Direct

on:
  workflow_dispatch:
    inputs:
      force_post:
        description: 'Forcer'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python_version: '3.10'
      - name: Install
        run: pip install requests requests-toolbelt google-api-python-client google-auth-httplib2 google-auth-oauthlib supabase
      - name: Run
        env:
          ACCOUNT_NAME: "tiktok_1"
          FORCE_POST: ${{ github.event.inputs.force_post == 'true' && '1' || '0' }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GDRIVE_SA_JSON_B64: ${{ secrets.GDRIVE_SA_JSON_B64 }}
          TIKTOK_COOKIES_TIKTOK_1: ${{ secrets.TIKTOK_COOKIES_TIKTOK_1 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/main.py