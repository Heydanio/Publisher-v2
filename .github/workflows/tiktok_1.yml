name: Bot TikTok 1 - Makiisthenes Engine

on:
  workflow_dispatch:
    inputs:
      force_post:
        description: 'Forcer'
        required: false
        default: 'false'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 🟢 Setup Node.js (Requis pour les signatures)
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python_version: '3.10'

      - name: 📥 Installer le moteur Makiisthenes (Light)
        run: |
          git clone https://github.com/makiisthenes/TiktokAutoUploader.git engine
          # On installe manuellement les vraies dépendances nécessaires
          pip install requests requests-toolbelt browser-cookie3
          # Installation de la signature Node (Crucial)
          cd engine/tiktok_uploader/tiktok-signature/ && npm install

      - name: 📦 Installer tes dépendances
        run: pip install google-api-python-client google-auth-httplib2 google-auth-oauthlib supabase requests requests-toolbelt

      - name: 🚀 Run Publisher
        env:
          # On dit à Python de regarder dans le dossier racine ET dans le dossier engine
          PYTHONPATH: .:${{ github.workspace }}/engine
          ACCOUNT_NAME: "tiktok_1"
          FORCE_POST: ${{ github.event.inputs.force_post == 'true' && '1' || '0' }}
          DRIVE_FOLDER_ID: ${{ secrets.DRIVE_FOLDER_ID }}
          GDRIVE_SA_JSON_B64: ${{ secrets.GDRIVE_SA_JSON_B64 }}
          TIKTOK_COOKIES_TIKTOK_1: ${{ secrets.TIKTOK_COOKIES_TIKTOK_1 }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: python src/main.py