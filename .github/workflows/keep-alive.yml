name: 🔋 Keep Alive - Anti-Suspension GitHub

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  keep-alive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔄 Update Timestamp
        run: |
          mkdir -p .github/keep-alive
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M:%S UTC')
          TIMESTAMP_ISO=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          
          cat > .github/keep-alive/timestamp.txt << EOF
          Last Keep-Alive: $TIMESTAMP
          ISO: $TIMESTAMP_ISO
          Status: ✅ ACTIVE
          EOF
          
          echo "✅ Keep-alive timestamp updated: $TIMESTAMP"

      - name: 📝 Add Activity Log
        run: |
          mkdir -p .github/activity-logs
          echo "Keep-Alive Run: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> .github/activity-logs/history.txt

      - name: 🔐 Configure Git
        run: |
          git config --global user.name "🤖 Keep-Alive Bot"
          git config --global user.email "actions@github.com"

      - name: 📤 Commit & Push
        run: |
          git add .github/keep-alive/timestamp.txt .github/activity-logs/history.txt 2>/dev/null || true
          COMMIT_MSG="🔋 Keep-Alive: $(date -u +'%Y-%m-%d %H:%M:%S') | Anti-suspension heartbeat"
          git commit -m "$COMMIT_MSG" 2>/dev/null || echo "ℹ️ Nothing to commit"
          git push 2>/dev/null || echo "ℹ️ Nothing to push"

      - name: 📊 Summary
        run: |
          echo "════════════════════════════════════════════════════════════"
          echo "🔋 KEEP-ALIVE EXECUTED SUCCESSFULLY"
          echo "════════════════════════════════════════════════════════════"
          echo "Time: $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          echo "Status: ✅ SUCCESS"
          echo "Purpose: GitHub will NOT suspend this repo"
          echo "════════════════════════════════════════════════════════════"
